<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 231 – Course Home Page – André Piros</title>
    <meta name="description" content="André Piros' Course Home Page for WDD 231, featuring a dynamic course list and responsive design.">
    <meta name="author" content="André Piros">

    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/larger.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">

    <script defer src="scripts/getdate.js" defer></script>
    <script defer src="scripts/navigation.js" defer></script>
    <script defer src="scripts/course.js" defer></script>
</head>
<body>
    <header>
        <div class="header-content">
            <img src="images/earth-outline.svg" alt="Course Logo" width="50" height="50">
            <span>WDD 231 | Index Page</span>
        </div>
        <button id="hamburgerBtn">☰</button>
    </header>
    
    <nav id="primaryNav">
        <ul>
            <li><a href="index.html" class="active">Home</a></li>
            <li><a href="#">Chamber</a></li>
            <li><a href="#">Final</a></li>
        </ul>
    </nav>
    
    <main>
        <h1>Home</h1>
        
        <section class="about">
            <h2>About me</h2>
            <p>My name is André. I am from São Paulo, Brazil. I am currently a student at BYU-Idaho, studying Software Development. I like to hike, read, and play basketball.</p>
        </section>
        
        <section class="courses">
            <h2>Course Work</h2>
            <div class="button-group">
                <button id="allBtn">All Courses</button>
                <button id="wddBtn">WDD Courses</button>
                <button id="cseBtn">CSE Courses</button>
            </div>
            <div id="courseCards" class="course-grid"></div>
            <p id="totalCredits" class="total-credits"></p>
        </section>
        
        <section class="location">
            <h2>São Paulo, Brazil</h2>
            <figure>
                <img src="images/sp_skyline.webp" alt="São Paulo Skyline" loading="lazy">
                <figcaption>São Paulo is a vibrant financial center in Brazil.</figcaption>
            </figure>
        </section>
    </main>
    
    <footer>
        <a href="https://github.com/Saxogoal?tab=repositories"><img src="images/logo-github.svg" alt="GitHub"></a>
        <a href="https://www.linkedin.com/in/andré-piros-250062210/"><img src="images/logo-linkedin.svg" alt="LinkedIn"></a>
        <p>&copy; <span id="currentyear"></span> André Piros</p>
        <p>Last Modified: <span id="lastModified"></span></p>
    </footer>
</body>
</html>
