    <meta property="og:url" content="https://saxogoal.github.io/wdd231/finalproject/log.html">

    <meta property="og:locale" content="en_US">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Log | PageTurner Hub">
    <meta name="twitter:description"
        content="Log your completed books, write reviews, and set your yearly reading goal with PageTurner Hub.">

    <link rel="icon" href="images/pgturner.ico">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

        rel="stylesheet">
    <link rel="stylesheet" href="styles/pgturner.css">
    <link rel="stylesheet" href="styles/pgturner-large.css">

    <script src="scripts/common.js" defer></script>
    <script type="module" src="scripts/log.js" defer></script>
</head>

<body>
    <header>
        <div class="header-top">
            <a href="home.html" class="nav-logo" aria-label="PageTurner Hub Home">
                <picture>
                    <img src="images/pgturner.webp" alt="PageTurner Hub logo" width="52" height="35"
                        fetchpriority="high" onerror="this.style.display='none'">
                </picture>
            </a>
            <p class="site-title">PageTurner Hub</p>
            <nav aria-label="Main navigation">
                <button id="menu" aria-label="Open navigation menu" aria-expanded="false"
                    aria-controls="navLinks"></button>
            </nav>
        </div>
        <div class="nav-links" id="navLinks">
            <a href="home.html">Home</a>
            <a href="library.html">Library</a>
            <a href="log.html" aria-current="page">Log</a>
        </div>
    </header>

    <main>
        <div class="log-header">
            <span class="section-label" style="color:var(--accent); opacity:0.8;">Reading Log</span>
            <h1>Your Book Log</h1>
            <p>Record what you've read, rate it, and track your yearly goal.</p>
        </div>

        <div class="log-layout">
            <!-- LOG FORM -->
            <section class="log-form-section">
                <h2>Log a completed book</h2>
                <form id="logForm" action="log-action.html" method="GET" novalidate>
                    <div class="form-group">
                        <label for="bookTitle">Book Title <span aria-hidden="true">*</span></label>
                        <input type="text" id="bookTitle" name="title" placeholder="Enter the book title" required
                            minlength="1">
                    </div>

                    <div class="form-group">
                        <label for="bookAuthor">Author <span aria-hidden="true">*</span></label>
                        <input type="text" id="bookAuthor" name="author" placeholder="Author's name" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="bookGenre">Genre</label>
                            <select id="bookGenre" name="genre">
                                <option value="">Select genre</option>
                                <option value="Fantasy">Fantasy</option>
                                <option value="Science Fiction">Science Fiction</option>
                                <option value="Fiction">Fiction</option>
                                <option value="Historical Fiction">Historical Fiction</option>
                                <option value="Non-Fiction">Non-Fiction</option>
                                <option value="Memoir">Memoir</option>
                                <option value="Self-Help">Self-Help</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="dateFinished">Date Finished</label>
                            <input type="date" id="dateFinished" name="date">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Your Rating</label>
                        <div class="rating-input" id="ratingInput" role="radiogroup" aria-label="Book rating">
                            <button type="button" class="star-btn" data-value="1" aria-label="1 star">★</button>
                            <button type="button" class="star-btn" data-value="2" aria-label="2 stars">★</button>
                            <button type="button" class="star-btn" data-value="3" aria-label="3 stars">★</button>
                            <button type="button" class="star-btn" data-value="4" aria-label="4 stars">★</button>
                            <button type="button" class="star-btn" data-value="5" aria-label="5 stars">★</button>
                        </div>
                        <input type="hidden" name="rating" id="ratingValue" value="0">
                    </div>

                    <div class="form-group">
                        <label for="bookReview">Review / Notes</label>
                        <textarea id="bookReview" name="review" placeholder="What did you think? (optional)"
                            rows="3"></textarea>
                    </div>

                    <button type="submit" class="submit-btn">Log this book →</button>
                </form>
            </section>

            <!-- READING GOAL -->
            <section class="goals-section">
                <h2>Reading Goal</h2>
                <div class="goal-form">
                    <h3>📅 <span id="goalYear"></span> Goal</h3>
                    <div class="form-group" style="margin-bottom:0.5rem;">
                        <label for="goalTarget">Books to read this year</label>
                        <input type="number" id="goalTarget" name="goalTarget" min="1" max="365" placeholder="e.g. 24">
                    </div>
                    <button type="button" class="submit-btn" id="saveGoalBtn" style="margin-top:0.75rem;">Save
                        Goal</button>
                </div>

                <div class="goal-progress" id="goalProgress" style="display:none;">
                    <h3 style="font-size:1rem; margin-bottom:0.75rem;">Progress</h3>
                    <div class="progress-bar-wrap">
                        <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
                    </div>
                    <p class="progress-label" id="progressLabel"></p>
                </div>
            </section>
        </div>

        <!-- LOG ENTRIES -->
        <div class="log-entries-full">
            <section class="log-entries-section">
                <h2>Books you've read <span id="logCount"
                        style="font-family:var(--mono-font); font-size:0.85rem; color:var(--secondary); font-weight:600;"></span>
                </h2>
                <div class="log-list" id="logList" aria-live="polite">
                    <p class="empty-log">No books logged yet. Use the form above to add your first one!</p>
                </div>
            </section>
        </div>
    </main>

    <footer>
        <a href="https://github.com/Saxogoal?tab=repositories" aria-label="GitHub Profile">
            <img src="images/logo-github.svg" alt="GitHub" width="22" height="22">
        </a>
        <a href="https://www.linkedin.com/in/andr%C3%A9-piros-250062210/" aria-label="LinkedIn Profile">
            <img src="images/logo-linkedin.svg" alt="LinkedIn" width="22" height="22">
        </a>
        <p>&copy; <span id="currentyear"></span> André Piros</p>
        <p>Last Modified: <span id="lastModified"></span></p>
    </footer>
</body>

</html>
