<body>
    <header>
        <div class="header-top">
            <a href="home.html" class="nav-logo">
                <img src="images/pgturner.webp" alt="PageTurner Hub Logo" width="52" height="52">
            </a>
            <span class="site-title">PageTurner Hub</span>
            <button id="menu" aria-label="Toggle Navigation Menu">
                <span class="line1"></span>
                <span class="line2"></span>
                <span class="line3"></span>
            </button>
        </div>
        <nav class="nav-links" id="navLinks">
            <a href="home.html">Home</a>
            <a href="library.html">Library</a>
            <a href="log.html" aria-current="page">Reading Log</a>
        </nav>
    </header>

    <main>
        <section class="log-header">
            <h1>Your Personal Reading Log</h1>
            <p>Save finished reading details, write short reports, and balance goals.</p>
        </section>

        <div class="log-layout">
            <section class="log-form-section">
                <h2>Record a Book</h2>
                <form id="logBookForm" action="log-action.html" method="get">
                    <div class="form-field">
                        <label for="bookTitle">Book Title *</label>
                        <input type="text" id="bookTitle" name="title" required placeholder="e.g., The Great Gatsby">
                    </div>
                
                    <div class="form-field">
                        <label for="bookAuthor">Author *</label>
                        <input type="text" id="bookAuthor" name="author" required placeholder="e.g., F. Scott Fitzgerald">
                    </div>
                
                    <div class="form-fields-row">
                        <div class="form-field">
                            <label for="bookGenre">Genre</label>
                            <select id="bookGenre" name="genre">
                                <option value="Fiction">Fiction</option>
                                <option value="Dystopian">Dystopian</option>
                                <option value="Fantasy">Fantasy</option>
                                <option value="Mystery">Mystery</option>
                                <option value="Sci-Fi">Sci-Fi</option>
                                <option value="Romance">Romance</option>
                                <option value="Biography">Biography</option>
                                <option value="Self-Help">Self-Help</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="form-field">
                            <label for="bookPages">Page Count</label>
                            <input type="number" id="bookPages" name="pages" min="1" placeholder="320">
                        </div>
                    </div>
                
                    <div class="form-field">
                        <label for="bookFinishDate">Date Finished *</label>
                        <input type="date" id="bookFinishDate" name="finishDate" required>
                    </div>
                
                    <div class="form-field">
                        <label>Your Rating</label>
                        <div class="rating-input">
                            <button type="button" class="star-btn" data-value="1" aria-label="1 Star">★</button>
                            <button type="button" class="star-btn" data-value="2" aria-label="2 Stars">★</button>
                            <button type="button" class="star-btn" data-value="3" aria-label="3 Stars">★</button>
                            <button type="button" class="star-btn" data-value="4" aria-label="4 Stars">★</button>
                            <button type="button" class="star-btn" data-value="5" aria-label="5 Stars">★</button>
                        </div>
                        <input type="hidden" id="bookRating" name="rating" value="0">
                    </div>
                
                    <div class="form-field">
                        <label for="bookNotes">Thoughts & Notes</label>
                        <textarea id="bookNotes" name="notes" placeholder="What stayed with you after finishing this book?"></textarea>
                    </div>
                
                    <button type="submit" class="submit-btn">Save Entry to Log</button>
                </form>
                
                <div class="goal-form">
                    <h3>Configure Target</h3>
                    <div class="form-fields-row">
                        <div class="form-field">
                            <label for="goalInput">Books Target</label>
                            <input type="number" id="goalInput" min="1" max="200" value="12">
                        </div>
                    </div>
                </div>

        <div class="log-entries-full">
            <section class="log-entries-section">
                <h2>Books you've read <span id="logCount"></span></h2>
                <div class="log-list" id="logList">
                    <p class="empty-log">No books logged yet. Use the form above to add your first one!</p>
                </div>
            </section>
        </div>
    </main>

    <footer>
